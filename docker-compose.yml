services:
  # ── Hot state ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    command: redis-server --appendonly yes

  # ── Warm store: TimescaleDB + pgvector ────────────────────────
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER:     yukti
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       yukti
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql

  # ── The agent + web portal (single container) ─────────────────
  yukti:
    build: .
    restart: unless-stopped
    depends_on: [redis, postgres]
    env_file: [.env]
    environment:
      REDIS_URL:      redis://redis:6379/0
      POSTGRES_URL:   postgresql+psycopg://yukti:${POSTGRES_PASSWORD}@postgres:5432/yukti
      MODE:           ${MODE:-paper}   # live | paper | shadow | backtest
    ports:
      - "8000:8000"     # FastAPI serves BOTH the API and the React webapp

  # ── Metrics ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
